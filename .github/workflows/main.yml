name: Deploy to Server

on:
  push:
    branches:
      - claude/video-support-system-01X6ZBEL2ThU71gquors7u41

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📂 Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 222
          script: |
            cd /usr/www/users/kvadrv/projects/videocall

            if [ ! -d ".git" ]; then
              echo "Repo not found, cloning fresh..."
              git clone --depth=1 -b master https://github.com/gurularavel/claude_video_rec.git .
            else
              echo "Repo exists, resetting to remote HEAD..."
              git fetch --all
              git reset --hard origin/master
            fi
